name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore .NET solution
        run: dotnet restore ErrorAnalyzer.sln

      - name: Restore .NET workloads
        run: dotnet workload restore src/ErrorAnalyzer.WASM/ErrorAnalyzer.WASM.csproj

      - name: Build combined analyzer site and core docs
        run: bun run build:pages:site s1-error-analyzer

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/scheduleone-error-analyzer/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
